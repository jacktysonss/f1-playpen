<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Playpen</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --accent: #e94560;
      --text: #eee;
      --muted: #999;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    header {
      background: var(--surface);
      padding: 1rem;
      text-align: center;
      border-bottom: 2px solid var(--accent);
    }

    header h1 { font-size: 1.4rem; }
    header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.25rem; }

    main { padding: 1rem; max-width: 800px; margin: 0 auto; }

    .controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    select, button {
      background: var(--card);
      color: var(--text);
      border: 1px solid #333;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    button {
      background: var(--accent);
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    button:active { opacity: 0.8; }

    .tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1rem;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab {
      background: var(--surface);
      color: var(--muted);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .tab.active {
      background: var(--card);
      color: var(--text);
      border-bottom: 2px solid var(--accent);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: var(--card);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }

    .card h3 { font-size: 0.95rem; margin-bottom: 0.5rem; }

    .driver-row {
      display: flex;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 0.75rem;
    }

    .driver-row:last-child { border-bottom: none; }

    .pos {
      font-weight: 700;
      font-size: 1.1rem;
      width: 2rem;
      text-align: center;
    }

    .team-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .driver-info { flex: 1; }
    .driver-name { font-weight: 600; font-size: 0.9rem; }
    .team-name { color: var(--muted); font-size: 0.75rem; }
    .lap-time { font-family: "SF Mono", monospace; font-size: 0.9rem; }

    .lap-bar-container { margin: 0.3rem 0; }

    .lap-bar-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
      font-size: 0.8rem;
    }

    .lap-bar-label { width: 2rem; text-align: right; color: var(--muted); flex-shrink: 0; }

    .lap-bar-track { flex: 1; min-width: 0; }

    .lap-bar {
      height: 18px;
      border-radius: 3px;
      min-width: 4px;
    }

    .lap-bar-time { font-family: "SF Mono", monospace; font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }

    .stint-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.75rem 0 0.25rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 0.3rem;
    }

    .stint-header:first-child { margin-top: 0; }

    .compound {
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .compound-SOFT { background: #e53935; color: #fff; }
    .compound-MEDIUM { background: #fdd835; color: #222; }
    .compound-HARD { background: #eee; color: #222; }
    .compound-INTERMEDIATE { background: #43a047; color: #fff; }
    .compound-WET { background: #1e88e5; color: #fff; }

    .best-lap-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0;
      font-size: 0.8rem;
    }

    .best-lap-row .label { color: var(--muted); font-style: italic; width: 2rem; text-align: right; }
    .best-lap-row .time { font-family: "SF Mono", monospace; font-weight: 700; color: #ab47bc; }

    .session-best {
      font-family: "SF Mono", monospace;
      font-weight: 700;
      color: #ab47bc;
      font-size: 0.95rem;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }

    .weather-stat {
      text-align: center;
      padding: 0.5rem;
    }

    .weather-stat .value { font-size: 1.5rem; font-weight: 700; }
    .weather-stat .label { color: var(--muted); font-size: 0.75rem; }

    .status { text-align: center; padding: 2rem; color: var(--muted); }
    .error { color: var(--accent); }

    #loading { display: none; text-align: center; padding: 1rem; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>F1 Playpen</h1>
    <p>Live data from OpenF1 API</p>
  </header>

  <main>
    <div class="controls">
      <select id="year"></select>
      <select id="event"><option>Select year first</option></select>
      <select id="session"><option>Select event first</option></select>
      <button id="load">Load</button>
    </div>

    <div id="loading">Loading...</div>

    <div id="results" style="display:none">
      <div class="tabs">
        <button class="tab active" data-tab="drivers">Drivers</button>
        <button class="tab" data-tab="laps">Lap Times</button>
        <button class="tab" data-tab="positions">Positions</button>
        <button class="tab" data-tab="weather">Weather</button>
      </div>

      <div id="drivers" class="panel active"></div>
      <div id="laps" class="panel"></div>
      <div id="positions" class="panel"></div>
      <div id="weather" class="panel"></div>
    </div>
  </main>

  <script>
    const API = "https://api.openf1.org/v1";

    const delay = ms => new Promise(r => setTimeout(r, ms));

    async function f1(endpoint, params = {}) {
      const url = new URL(`${API}/${endpoint}`);
      for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
      const res = await fetch(url);
      if (!res.ok) throw new Error(`${res.status}`);
      const data = await res.json();
      await delay(300);
      return data;
    }

    // --- Init ---
    const yearEl = document.getElementById("year");
    const eventEl = document.getElementById("event");
    const sessionEl = document.getElementById("session");
    const loadBtn = document.getElementById("load");
    const loadingEl = document.getElementById("loading");

    const currentYear = new Date().getFullYear();
    for (let y = currentYear; y >= 2023; y--) {
      yearEl.add(new Option(y, y));
    }

    let sessions = [];

    yearEl.addEventListener("change", loadSessions);
    eventEl.addEventListener("change", populateSessions);

    async function loadSessions() {
      eventEl.innerHTML = '<option>Loading...</option>';
      sessionEl.innerHTML = '<option>Select event first</option>';
      try {
        sessions = await f1("sessions", { year: yearEl.value });
        // Group finished sessions by meeting (event)
        const now = new Date();
        const finished = sessions.filter(s => s.date_end && new Date(s.date_end) < now);
        const events = new Map();
        for (const s of finished) {
          if (!events.has(s.meeting_key)) {
            events.set(s.meeting_key, {
              meeting_key: s.meeting_key,
              name: `${s.country_name} — ${s.circuit_short_name || ""}`,
              sessions: [],
            });
          }
          events.get(s.meeting_key).sessions.push(s);
        }
        eventEl.innerHTML = '<option value="">— Select event —</option>';
        for (const [key, evt] of events) {
          eventEl.add(new Option(evt.name, key));
        }
      } catch (e) {
        eventEl.innerHTML = `<option>Error loading events</option>`;
      }
    }

    function populateSessions() {
      const mk = eventEl.value;
      sessionEl.innerHTML = "";
      if (!mk) { sessionEl.innerHTML = '<option>Select event first</option>'; return; }
      const evt = sessions.filter(s => String(s.meeting_key) === mk);
      const now = new Date();
      const finished = evt.filter(s => s.date_end && new Date(s.date_end) < now);
      // Sort by date so sessions appear in weekend order
      finished.sort((a, b) => new Date(a.date_start) - new Date(b.date_start));
      for (const s of finished) {
        sessionEl.add(new Option(s.session_name || s.session_type, s.session_key));
      }
    }

    // Tabs
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(tab.dataset.tab).classList.add("active");
      });
    });

    // Load data
    const resultsEl = document.getElementById("results");

    loadBtn.addEventListener("click", async () => {
      const sk = sessionEl.value;
      if (!sk) return;
      resultsEl.style.display = "none";
      loadingEl.style.display = "block";
      try {
        // Fetch shared data once
        const drivers = await f1("drivers", { session_key: sk });
        let positions = [];
        try { positions = await f1("position", { session_key: sk }); } catch {}

        renderDrivers(drivers, positions);
        await renderLaps(sk, drivers);
        renderPositions(drivers, positions);
        await loadWeather(sk);
      } catch (e) {
        console.error(e);
      } finally {
        loadingEl.style.display = "none";
        resultsEl.style.display = "block";
      }
    });

    function renderDrivers(drivers, positions) {
      const panel = document.getElementById("drivers");
      if (!drivers.length) { panel.innerHTML = '<p class="status">No driver data</p>'; return; }

      const lastPos = new Map();
      for (const p of positions) lastPos.set(p.driver_number, p.position);

      const sorted = [...drivers].sort((a, b) =>
        (lastPos.get(a.driver_number) ?? 99) - (lastPos.get(b.driver_number) ?? 99)
      );

      panel.innerHTML = '<div class="card">' + sorted.map(d => `
        <div class="driver-row">
          <span class="pos">${lastPos.get(d.driver_number) ?? "-"}</span>
          <span class="team-dot" style="background:#${d.team_colour || '666'}"></span>
          <div class="driver-info">
            <div class="driver-name">${d.full_name || d.first_name + " " + d.last_name}</div>
            <div class="team-name">${d.team_name || ""}</div>
          </div>
          <span class="lap-time">#${d.driver_number}</span>
        </div>
      `).join("") + '</div>';
    }

    function fmtTime(secs) {
      if (!secs) return "-";
      const mins = Math.floor(secs / 60);
      const rem = secs - mins * 60;
      return mins > 0
        ? `${mins}:${rem.toFixed(3).padStart(6, "0")}`
        : rem.toFixed(3);
    }

    async function renderLaps(sk, drivers) {
      const panel = document.getElementById("laps");
      try {
        const acronyms = new Map(drivers.map(d => [d.driver_number, d.name_acronym]));
        const colours = new Map(drivers.map(d => [d.driver_number, d.team_colour || "666"]));

        // Fetch stints once for all drivers
        const stints = await f1("stints", { session_key: sk });

        const topDrivers = drivers.slice(0, 6);
        const allLaps = [];
        for (const d of topDrivers) {
          allLaps.push(await f1("laps", { session_key: sk, driver_number: d.driver_number }));
        }

        // Filter outlier laps (out/in laps, pit laps, red flags, etc.)
        // Use 115% of the fastest lap as the cutoff — similar to F1's 107% rule
        const rawTimes = allLaps.flat().map(l => l.lap_duration).filter(Boolean);
        if (!rawTimes.length) { panel.innerHTML = '<p class="status">No lap data</p>'; return; }
        const fastestLap = Math.min(...rawTimes);
        const lapCutoff = fastestLap * 1.15;

        const allTimes = rawTimes.filter(t => t <= lapCutoff).sort((a, b) => a - b);
        if (!allTimes.length) { panel.innerHTML = '<p class="status">No lap data</p>'; return; }
        const minTime = allTimes[0];
        const maxTime = allTimes[allTimes.length - 1];

        let html = "";
        for (let i = 0; i < topDrivers.length; i++) {
          const d = topDrivers[i];
          const laps = allLaps[i].filter(l => l.lap_duration && l.lap_duration <= lapCutoff);
          if (!laps.length) continue;

          const sessionBest = Math.min(...laps.map(l => l.lap_duration));
          const driverStints = stints
            .filter(s => s.driver_number === d.driver_number)
            .sort((a, b) => a.stint_number - b.stint_number);

          html += `<div class="card">
            <h3>${acronyms.get(d.driver_number) || d.driver_number}
              <span class="session-best">${fmtTime(sessionBest)}</span></h3>
            <div class="lap-bar-container">`;

          if (driverStints.length) {
            for (const stint of driverStints) {
              const stintLaps = laps.filter(l =>
                l.lap_number >= stint.lap_start && l.lap_number <= stint.lap_end
              );
              if (!stintLaps.length) continue;

              const compound = stint.compound || "UNKNOWN";
              const stintBest = Math.min(...stintLaps.map(l => l.lap_duration));

              html += `<div class="stint-header">
                <span class="compound compound-${compound}">${compound}</span>
                Stint ${stint.stint_number} (Laps ${stint.lap_start}–${stint.lap_end})
                · Age ${stint.tyre_age_at_start}
              </div>`;
              html += `<div class="best-lap-row">
                <span class="label">Best</span>
                <span class="time">${fmtTime(stintBest)}</span>
              </div>`;

              for (const lap of stintLaps) {
                const pct = maxTime === minTime ? 1 : 1 - (lap.lap_duration - minTime) / (maxTime - minTime);
                const width = Math.max(15, pct * 100);
                html += `<div class="lap-bar-row">
                  <span class="lap-bar-label">${lap.lap_number}</span>
                  <div class="lap-bar-track"><div class="lap-bar" style="width:${width}%;background:#${colours.get(d.driver_number)}"></div></div>
                  <span class="lap-bar-time">${fmtTime(lap.lap_duration)}</span>
                </div>`;
              }
            }
          } else {
            // Fallback if no stint data
            for (const lap of laps) {
              const pct = maxTime === minTime ? 1 : 1 - (lap.lap_duration - minTime) / (maxTime - minTime);
              const width = Math.max(15, pct * 100);
              html += `<div class="lap-bar-row">
                <span class="lap-bar-label">${lap.lap_number}</span>
                <div class="lap-bar-track"><div class="lap-bar" style="width:${width}%;background:#${colours.get(d.driver_number)}"></div></div>
                <span class="lap-bar-time">${fmtTime(lap.lap_duration)}</span>
              </div>`;
            }
          }

          html += "</div></div>";
        }
        panel.innerHTML = html || '<p class="status">No lap data</p>';
      } catch (e) {
        panel.innerHTML = `<p class="status error">Error: ${e.message}</p>`;
      }
    }

    function renderPositions(drivers, positions) {
      const panel = document.getElementById("positions");
      if (!positions.length) { panel.innerHTML = '<p class="status">No position data</p>'; return; }

      const acronyms = new Map(drivers.map(d => [d.driver_number, d.name_acronym]));
      const colours = new Map(drivers.map(d => [d.driver_number, d.team_colour || "666"]));

      const dates = [...new Set(positions.map(p => p.date))].sort();
      const step = Math.max(1, Math.floor(dates.length / 20));
      const sampled = dates.filter((_, i) => i % step === 0 || i === dates.length - 1);

      let html = '<div class="card"><h3>Position Changes (Top 10)</h3>';
      for (const date of sampled) {
        const atTime = positions
          .filter(p => p.date === date)
          .sort((a, b) => a.position - b.position)
          .slice(0, 10);

        const time = new Date(date).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        const row = atTime.map(p => {
          const acr = acronyms.get(p.driver_number) || p.driver_number;
          const col = colours.get(p.driver_number);
          return `<span style="color:#${col};font-weight:600;margin-right:0.4rem">${acr}</span>`;
        }).join("");

        html += `<div style="margin:0.3rem 0;font-size:0.8rem">
          <span style="color:var(--muted);margin-right:0.5rem;font-family:monospace">${time}</span>${row}
        </div>`;
      }
      html += "</div>";
      panel.innerHTML = html;
    }

    async function loadWeather(sk) {
      const panel = document.getElementById("weather");
      try {
        const weather = await f1("weather", { session_key: sk });
        if (!weather.length) { panel.innerHTML = '<p class="status">No weather data</p>'; return; }

        const latest = weather[weather.length - 1];
        panel.innerHTML = `<div class="card">
          <h3>Track Conditions</h3>
          <div class="weather-grid">
            <div class="weather-stat">
              <div class="value">${latest.air_temperature ?? "-"}°</div>
              <div class="label">Air Temp</div>
            </div>
            <div class="weather-stat">
              <div class="value">${latest.track_temperature ?? "-"}°</div>
              <div class="label">Track Temp</div>
            </div>
            <div class="weather-stat">
              <div class="value">${latest.humidity ?? "-"}%</div>
              <div class="label">Humidity</div>
            </div>
            <div class="weather-stat">
              <div class="value">${latest.wind_speed ?? "-"}</div>
              <div class="label">Wind (m/s)</div>
            </div>
            <div class="weather-stat">
              <div class="value">${latest.wind_direction ?? "-"}°</div>
              <div class="label">Wind Dir</div>
            </div>
            <div class="weather-stat">
              <div class="value">${latest.rainfall ? "Yes" : "No"}</div>
              <div class="label">Rain</div>
            </div>
            <div class="weather-stat">
              <div class="value">${latest.pressure ?? "-"}</div>
              <div class="label">Pressure (mbar)</div>
            </div>
          </div>
        </div>`;
      } catch (e) {
        panel.innerHTML = `<p class="status error">Error: ${e.message}</p>`;
      }
    }

    // Initial load
    loadSessions();
  </script>
</body>
</html>
