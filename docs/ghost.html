<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>F1 Ghost Car Comparison</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #e94560;
      --track: #30363d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* --- File picker / landing --- */
    #landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      padding: 2rem 1.5rem;
      overflow-y: auto;
    }

    .landing-header {
      text-align: center;
      margin-bottom: 1.5rem;
      flex-shrink: 0;
    }

    .landing-header h1 { font-size: 1.4rem; margin-bottom: 0.4rem; }
    .landing-header p { color: var(--muted); max-width: 32rem; font-size: 0.85rem; }

    .filter-bar {
      width: 100%;
      max-width: 44rem;
      margin-bottom: 1.25rem;
      flex-shrink: 0;
    }

    .filter-input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
    }

    .filter-input::placeholder { color: var(--muted); }
    .filter-input:focus { border-color: var(--accent); }

    #file-list {
      width: 100%;
      max-width: 44rem;
    }

    .year-group {
      margin-bottom: 1.25rem;
    }

    .year-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.5rem;
      padding-left: 0.25rem;
    }

    .year-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.5rem;
    }

    .file-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .file-btn:hover { border-color: var(--accent); background: #1c2129; }

    .file-btn .color-pip {
      width: 4px;
      border-radius: 2px;
      align-self: stretch;
      flex-shrink: 0;
    }

    .file-btn .btn-content { flex: 1; min-width: 0; }

    .file-btn .btn-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-btn .meta { color: var(--muted); font-size: 0.7rem; margin-top: 0.15rem; }

    .no-results {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 2rem 0;
    }

    /* --- Main visualisation layout --- */
    #app {
      display: none;
      height: 100vh;
      width: 100vw;
    }

    /* Landscape layout: telemetry | track | telemetry */
    .vis-container {
      display: grid;
      grid-template-columns: 160px 1fr 160px;
      grid-template-rows: auto 1fr auto;
      height: 100%;
      width: 100%;
    }

    /* Header spans full width */
    .vis-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 0.75rem;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      min-height: 36px;
    }

    .vis-header .session-info { color: var(--muted); }
    .vis-header .lap-delta {
      font-family: "SF Mono", "Fira Code", monospace;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
    }

    .back-btn:hover { color: var(--text); border-color: var(--text); }

    /* Telemetry side panels */
    .telem-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0.5rem;
      gap: 0.4rem;
      overflow: hidden;
    }

    .telem-panel.left { border-right: 1px solid var(--border); }
    .telem-panel.right { border-left: 1px solid var(--border); }

    .telem-driver {
      font-weight: 700;
      font-size: 0.85rem;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .telem-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      line-height: 1.6;
    }

    .telem-label { color: var(--muted); }

    .telem-value {
      font-family: "SF Mono", "Fira Code", monospace;
      font-weight: 600;
      min-width: 3.5rem;
      text-align: right;
    }

    /* Speed bar */
    .speed-bar-track {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 0.15rem;
    }

    .speed-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.08s linear;
    }

    /* Throttle/brake indicator */
    .pedal-row {
      display: flex;
      gap: 0.25rem;
      align-items: center;
      font-size: 0.7rem;
    }

    .pedal-indicator {
      width: 100%;
      height: 8px;
      border-radius: 2px;
      background: var(--border);
    }

    .pedal-indicator.active-throttle { background: #3fb950; }
    .pedal-indicator.active-brake { background: #f85149; }

    .lap-time-display {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.9rem;
      font-weight: 700;
      margin-top: 0.25rem;
      text-align: center;
    }

    /* Track canvas */
    .track-area {
      position: relative;
      overflow: hidden;
    }

    #trackCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Controls bar */
    .controls {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.4rem 0.75rem;
      background: var(--card);
      border-top: 1px solid var(--border);
      min-height: 40px;
    }

    .ctrl-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ctrl-btn.active { background: var(--accent); border-color: var(--accent); }

    .progress-track {
      flex: 1;
      max-width: 400px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      width: 0%;
      pointer-events: none;
    }

    .speed-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: "SF Mono", "Fira Code", monospace;
      min-width: 2.5rem;
      text-align: center;
    }

    .time-label {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 3rem;
    }

    .fullscreen-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      z-index: 10;
    }

    /* Pedals wrapper — no special styling in desktop/landscape */
    .telem-pedals { display: contents; }

    /* Mobile portrait: two-row compact telemetry */
    @media (max-width: 600px) and (orientation: portrait) {
      .vis-container {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr auto auto;
      }

      .telem-panel.left { border-right: none; border-bottom: 1px solid var(--border); }
      .telem-panel.right { border-left: none; border-top: 1px solid var(--border); }

      .telem-panel {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        gap: 0 0.6rem;
        padding: 0.2rem 0.5rem;
      }

      .telem-panel .telem-driver {
        margin-bottom: 0;
        font-size: 0.75rem;
      }

      .telem-panel .lap-time-display {
        font-size: 0.75rem;
        margin-top: 0;
      }

      .telem-panel .telem-row { gap: 0.2rem; font-size: 0.7rem; }
      .telem-panel .telem-value { min-width: auto; font-size: 0.7rem; }
      .speed-bar-track { display: none; }

      /* THR/BRK/DRS on a dedicated second row */
      .telem-panel .telem-pedals {
        display: flex;
        width: 100%;
        gap: 0.6rem;
        align-items: center;
      }

      .telem-panel .pedal-row {
        gap: 0.2rem;
        font-size: 0.65rem;
        display: flex;
        align-items: center;
      }

      .telem-panel .pedal-indicator {
        width: 40px;
        height: 6px;
      }

      .telem-panel .pedal-row .telem-label { min-width: auto !important; }

      .telem-panel .telem-pedals .telem-row { font-size: 0.65rem; }
    }

    /* Mobile landscape: side panels */
    @media (max-width: 600px) and (orientation: landscape) {
      .vis-container {
        grid-template-columns: 140px 1fr 140px;
        grid-template-rows: auto 1fr auto;
      }

      .telem-panel.left { border-right: 1px solid var(--border); border-bottom: none; }
      .telem-panel.right { border-left: 1px solid var(--border); border-top: none; }

      .telem-panel {
        flex-direction: column;
        flex-wrap: nowrap;
        justify-content: center;
      }

      .telem-panel .telem-driver { text-align: left; }
      .speed-bar-track { display: block; }
    }

    /* Loading state */
    .loading-msg {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>
<body>

<!-- Landing: pick a comparison file -->
<div id="landing">
  <div class="landing-header">
    <h1>Ghost Car Comparison</h1>
    <p>Compare two drivers' fastest laps side-by-side. Watch how gaps develop around the circuit with synchronised telemetry.</p>
  </div>
  <div class="filter-bar" id="filterBar" style="display:none">
    <input class="filter-input" id="filterInput" type="text" placeholder="Filter by driver, circuit, year...">
  </div>
  <div id="file-list">
    <p class="loading-msg">Loading available comparisons...</p>
  </div>
  <p style="font-size:0.75rem;color:var(--muted);margin-top:1rem;flex-shrink:0">
    <a href="index.html" style="color:var(--accent)">Back to dashboard</a>
  </p>
</div>

<!-- Main visualisation (hidden until data loaded) -->
<div id="app">
  <div class="vis-container">
    <!-- Header -->
    <div class="vis-header">
      <button class="back-btn" id="backBtn">Back</button>
      <span class="session-info" id="sessionInfo"></span>
      <span class="lap-delta" id="lapDelta"></span>
    </div>

    <!-- Left telemetry (Driver 1) -->
    <div class="telem-panel left" id="telemLeft"></div>

    <!-- Track canvas -->
    <div class="track-area">
      <canvas id="trackCanvas"></canvas>
    </div>

    <!-- Right telemetry (Driver 2) -->
    <div class="telem-panel right" id="telemRight"></div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn" id="restartBtn" title="Restart">&#8634;</button>
      <button class="ctrl-btn" id="playBtn" title="Play/Pause">&#9654;</button>
      <span class="time-label" id="timeLabel">0.000</span>
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="time-label" id="totalTime">0.000</span>
      <button class="ctrl-btn" id="slowerBtn" title="Slower">-</button>
      <span class="speed-label" id="speedLabel">1x</span>
      <button class="ctrl-btn" id="fasterBtn" title="Faster">+</button>
      <button class="ctrl-btn" id="fullscreenBtn" title="Fullscreen">&#x26F6;</button>
    </div>
  </div>
</div>

<script>
  // ---- State ----
  let data = null;
  let playing = false;
  let elapsed = 0;        // seconds into the animation
  let playbackSpeed = 1;
  let animFrame = null;
  let lastFrameTime = null;

  const speeds = [0.25, 0.5, 1, 2, 4, 8];
  let speedIdx = 2; // start at 1x

  // ---- Elements ----
  const landing = document.getElementById("landing");
  const app = document.getElementById("app");
  const canvas = document.getElementById("trackCanvas");
  const ctx = canvas.getContext("2d");

  // ---- Data loading ----

  let manifest = [];

  async function loadFileList() {
    const listEl = document.getElementById("file-list");
    try {
      const res = await fetch("data/ghost/manifest.json");
      if (!res.ok) throw new Error("No manifest");
      manifest = await res.json();

      if (!manifest.length) {
        listEl.innerHTML = '<p class="loading-msg">No comparisons generated yet. Run the generate script first.</p>';
        return;
      }

      // Show filter bar when there are multiple entries
      if (manifest.length > 1) {
        document.getElementById("filterBar").style.display = "";
        document.getElementById("filterInput").addEventListener("input", (e) => {
          renderFileList(e.target.value.trim().toLowerCase());
        });
      }

      renderFileList("");
    } catch {
      listEl.innerHTML = '<p class="loading-msg">No comparisons found.<br>Run <code>python scripts/generate_ghost_data.py</code> to create one.</p>';
    }
  }

  function renderFileList(filter) {
    const listEl = document.getElementById("file-list");

    // Filter entries
    const filtered = filter
      ? manifest.filter(e => {
          const text = `${e.label} ${e.meta} ${e.file}`.toLowerCase();
          return filter.split(/\s+/).every(word => text.includes(word));
        })
      : manifest;

    if (!filtered.length) {
      listEl.innerHTML = '<p class="no-results">No matches found.</p>';
      return;
    }

    // Group by year (extract from label like "2024 Bahrain...")
    const groups = {};
    for (const entry of filtered) {
      const yearMatch = entry.label && entry.label.match(/^(\d{4})/);
      const year = yearMatch ? yearMatch[1] : "Other";
      if (!groups[year]) groups[year] = [];
      groups[year].push(entry);
    }

    // Sort years descending (most recent first)
    const sortedYears = Object.keys(groups).sort((a, b) => b.localeCompare(a));

    listEl.innerHTML = "";
    for (const year of sortedYears) {
      const group = document.createElement("div");
      group.className = "year-group";

      // Only show year label if multiple years
      if (sortedYears.length > 1 || year !== "Other") {
        const label = document.createElement("div");
        label.className = "year-label";
        label.textContent = year === "Other" ? "Comparisons" : `${year} Season`;
        group.appendChild(label);
      }

      const grid = document.createElement("div");
      grid.className = "year-grid";

      for (const entry of groups[year]) {
        const btn = document.createElement("button");
        btn.className = "file-btn";

        // Extract driver color from meta or use accent
        const pipColor = "var(--accent)";

        // Show event + session + drivers as the title (strip the year prefix)
        const title = entry.label
          ? entry.label.replace(/^\d{4}\s*/, "")
          : entry.file;

        btn.innerHTML = `
          <div class="color-pip" style="background:${pipColor}"></div>
          <div class="btn-content">
            <div class="btn-title">${title}</div>
            <div class="meta">${entry.meta || ""}</div>
          </div>
        `;
        btn.addEventListener("click", () => loadComparison(entry.file));
        grid.appendChild(btn);
      }

      group.appendChild(grid);
      listEl.appendChild(group);
    }
  }

  async function loadComparison(filename) {
    const listEl = document.getElementById("file-list");
    listEl.innerHTML = '<p class="loading-msg">Loading telemetry data...</p>';

    try {
      const res = await fetch(`data/ghost/${filename}`);
      if (!res.ok) throw new Error(`Failed to load ${filename}`);
      data = await res.json();

      initVisualisation();
    } catch (e) {
      listEl.innerHTML = `<p class="loading-msg" style="color:#f85149">Error: ${e.message}</p>`;
    }
  }

  // ---- Initialise visualisation ----

  function initVisualisation() {
    landing.style.display = "none";
    app.style.display = "block";

    // Session info
    const s = data.session;
    document.getElementById("sessionInfo").textContent =
      `${s.year} ${s.event} — ${s.session} — ${s.circuit}`;

    // Lap delta
    const delta = data.driver2.lap_time - data.driver1.lap_time;
    const deltaStr = (delta >= 0 ? "+" : "") + delta.toFixed(3) + "s";
    const deltaEl = document.getElementById("lapDelta");
    deltaEl.textContent = `${data.driver1.code} vs ${data.driver2.code}: ${deltaStr}`;
    deltaEl.style.color = delta > 0 ? `#${data.driver1.color}` : `#${data.driver2.color}`;

    // Total time = slower lap
    const totalTime = Math.max(data.driver1.lap_time, data.driver2.lap_time);
    document.getElementById("totalTime").textContent = fmtTime(totalTime);

    // Build telemetry panels
    buildTelemPanel("telemLeft", data.driver1);
    buildTelemPanel("telemRight", data.driver2);

    // Setup canvas
    resizeCanvas();
    window.addEventListener("resize", () => { resizeCanvas(); drawFrame(); });

    // Controls
    document.getElementById("playBtn").addEventListener("click", togglePlay);
    document.getElementById("restartBtn").addEventListener("click", restart);
    document.getElementById("slowerBtn").addEventListener("click", () => changeSpeed(-1));
    document.getElementById("fasterBtn").addEventListener("click", () => changeSpeed(1));
    document.getElementById("fullscreenBtn").addEventListener("click", goFullscreen);
    document.getElementById("backBtn").addEventListener("click", goBack);

    // Progress bar scrubbing
    const progressTrack = document.getElementById("progressTrack");
    let scrubbing = false;

    const scrub = (e) => {
      const rect = progressTrack.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      elapsed = pct * Math.max(data.driver1.lap_time, data.driver2.lap_time);
      drawFrame();
    };

    progressTrack.addEventListener("mousedown", (e) => { scrubbing = true; scrub(e); });
    progressTrack.addEventListener("touchstart", (e) => { scrubbing = true; scrub(e); }, { passive: true });
    window.addEventListener("mousemove", (e) => { if (scrubbing) scrub(e); });
    window.addEventListener("touchmove", (e) => { if (scrubbing) scrub(e); }, { passive: true });
    window.addEventListener("mouseup", () => { scrubbing = false; });
    window.addEventListener("touchend", () => { scrubbing = false; });

    // Keyboard controls
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") { e.preventDefault(); togglePlay(); }
      if (e.code === "ArrowRight") { elapsed = Math.min(elapsed + 1, totalTime); drawFrame(); }
      if (e.code === "ArrowLeft") { elapsed = Math.max(elapsed - 1, 0); drawFrame(); }
      if (e.code === "KeyR") restart();
    });

    // Initial draw
    elapsed = 0;
    drawFrame();
  }

  // Cache DOM refs for telemetry panels to avoid querySelector every frame
  const telemCache = {};

  function buildTelemPanel(id, driver) {
    const el = document.getElementById(id);
    el.innerHTML = `
      <div class="telem-driver" style="color:#${driver.color}">${driver.code} <span style="font-weight:400;color:var(--muted);font-size:0.7rem">#${driver.number}</span></div>
      <div class="lap-time-display" data-field="laptime">—</div>
      <div class="telem-row"><span class="telem-label">Speed</span><span class="telem-value" data-field="speed">—</span></div>
      <div class="speed-bar-track"><div class="speed-bar" data-field="speedbar" style="background:#${driver.color};width:0%"></div></div>
      <div class="telem-row"><span class="telem-label">Gear</span><span class="telem-value" data-field="gear">—</span></div>
      <div class="telem-pedals">
        <div class="pedal-row"><span class="telem-label" style="min-width:2rem">THR</span><div class="pedal-indicator" data-field="throttle"></div></div>
        <div class="pedal-row"><span class="telem-label" style="min-width:2rem">BRK</span><div class="pedal-indicator" data-field="brake"></div></div>
        <div class="telem-row"><span class="telem-label">DRS</span><span class="telem-value" data-field="drs">—</span></div>
      </div>
    `;

    // Cache element references
    telemCache[id] = {
      laptime: el.querySelector('[data-field="laptime"]'),
      speed: el.querySelector('[data-field="speed"]'),
      speedbar: el.querySelector('[data-field="speedbar"]'),
      gear: el.querySelector('[data-field="gear"]'),
      throttle: el.querySelector('[data-field="throttle"]'),
      brake: el.querySelector('[data-field="brake"]'),
      drs: el.querySelector('[data-field="drs"]'),
    };
  }

  let lastTelemUpdate = 0;

  function updateTelemPanel(id, driver, t) {
    const c = telemCache[id];
    if (!c) return;
    const tel = driver.telemetry;
    const clampedT = Math.min(t, driver.lap_time);

    // Binary search for index
    let lo = 0, hi = tel.time.length - 1;
    while (lo < hi - 1) {
      const mid = (lo + hi) >> 1;
      if (tel.time[mid] <= clampedT) lo = mid;
      else hi = mid;
    }
    const idx = lo;

    const speed = tel.speed[idx];
    const gear = tel.gear[idx];
    const throttle = tel.throttle[idx];
    const brake = tel.brake[idx];
    const drs = tel.drs[idx];

    c.laptime.textContent = fmtTime(clampedT);
    c.speed.textContent = Math.round(speed) + " km/h";
    c.speedbar.style.width = (speed / 360 * 100) + "%";
    c.gear.textContent = gear;
    c.throttle.className = "pedal-indicator" + (throttle > 50 ? " active-throttle" : "");
    c.brake.className = "pedal-indicator" + (brake ? " active-brake" : "");
    c.drs.textContent = drs > 0 ? "OPEN" : "—";
    c.drs.style.color = drs > 0 ? "#3fb950" : "var(--muted)";
  }

  // ---- Canvas rendering ----

  let trackBounds = null; // { minX, maxX, minY, maxY, scale, offsetX, offsetY }

  function resizeCanvas() {
    const area = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = area.clientWidth * dpr;
    canvas.height = area.clientHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    trackBounds = null; // recalculate
  }

  function computeBounds() {
    const t = data.track;
    const padding = 40;
    const w = canvas.width / (window.devicePixelRatio || 1);
    const h = canvas.height / (window.devicePixelRatio || 1);

    const minX = Math.min(...t.x);
    const maxX = Math.max(...t.x);
    const minY = Math.min(...t.y);
    const maxY = Math.max(...t.y);
    const rangeX = maxX - minX || 1;
    const rangeY = maxY - minY || 1;

    const scale = Math.min((w - padding * 2) / rangeX, (h - padding * 2) / rangeY);
    const offsetX = (w - rangeX * scale) / 2;
    const offsetY = (h - rangeY * scale) / 2;

    trackBounds = { minX, maxX, minY, maxY, scale, offsetX, offsetY };
  }

  function toScreen(x, y) {
    const b = trackBounds;
    return [
      (x - b.minX) * b.scale + b.offsetX,
      (b.maxY - y) * b.scale + b.offsetY,
    ];
  }

  // Catmull-Rom spline for smooth interpolation
  function catmullRom(p0, p1, p2, p3, t) {
    const t2 = t * t, t3 = t2 * t;
    return 0.5 * (
      (2 * p1) +
      (-p0 + p2) * t +
      (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 +
      (-p0 + 3 * p1 - 3 * p2 + p3) * t3
    );
  }

  function getDriverPos(driver, t) {
    const tel = driver.telemetry;
    const clampedT = Math.min(t, driver.lap_time);
    const len = tel.time.length;

    // Binary search for the interval
    let lo = 0, hi = len - 1;
    while (lo < hi - 1) {
      const mid = (lo + hi) >> 1;
      if (tel.time[mid] <= clampedT) lo = mid;
      else hi = mid;
    }
    const i = lo;

    // If at end, return last point
    if (i >= len - 1) return [tel.x[len - 1], tel.y[len - 1]];

    // Fractional position within this segment
    const t0 = tel.time[i];
    const t1 = tel.time[i + 1];
    const frac = t1 > t0 ? (clampedT - t0) / (t1 - t0) : 0;

    // Catmull-Rom with clamped neighbor indices
    const i0 = Math.max(0, i - 1);
    const i3 = Math.min(len - 1, i + 2);

    return [
      catmullRom(tel.x[i0], tel.x[i], tel.x[i + 1], tel.x[i3], frac),
      catmullRom(tel.y[i0], tel.y[i], tel.y[i + 1], tel.y[i3], frac),
    ];
  }

  function drawFrame() {
    if (!data) return;
    if (!trackBounds) computeBounds();

    const w = canvas.width / (window.devicePixelRatio || 1);
    const h = canvas.height / (window.devicePixelRatio || 1);
    ctx.clearRect(0, 0, w, h);

    // Draw track outline
    const t = data.track;
    ctx.beginPath();
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 12;
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    for (let i = 0; i < t.x.length; i++) {
      const [sx, sy] = toScreen(t.x[i], t.y[i]);
      if (i === 0) ctx.moveTo(sx, sy);
      else ctx.lineTo(sx, sy);
    }
    ctx.closePath();
    ctx.stroke();

    // Thinner center line
    ctx.beginPath();
    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    ctx.lineWidth = 1;
    for (let i = 0; i < t.x.length; i++) {
      const [sx, sy] = toScreen(t.x[i], t.y[i]);
      if (i === 0) ctx.moveTo(sx, sy);
      else ctx.lineTo(sx, sy);
    }
    ctx.closePath();
    ctx.stroke();

    // Draw corner numbers
    ctx.font = "10px -apple-system, sans-serif";
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for (const c of data.corners) {
      const [sx, sy] = toScreen(c.x, c.y);
      ctx.fillText(c.number, sx, sy);
    }

    // Draw start/finish line
    if (t.x.length > 1) {
      const [sx, sy] = toScreen(t.x[0], t.y[0]);
      ctx.beginPath();
      ctx.arc(sx, sy, 4, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.4)";
      ctx.fill();
    }

    const totalTime = Math.max(data.driver1.lap_time, data.driver2.lap_time);

    // Determine which driver is behind (draw behind first, ahead on top)
    const d1Done = elapsed >= data.driver1.lap_time;
    const d2Done = elapsed >= data.driver2.lap_time;

    // Draw driver dots
    const radius = Math.min(w, h) < 400 ? 7 : 6;

    // Get both positions to detect proximity
    const [p1x, p1y] = getDriverPos(data.driver1, elapsed);
    const [s1x, s1y] = toScreen(p1x, p1y);
    const [p2x, p2y] = getDriverPos(data.driver2, elapsed);
    const [s2x, s2y] = toScreen(p2x, p2y);
    const dist = Math.hypot(s1x - s2x, s1y - s2y);

    // When cars are close, push labels further apart
    const baseLabelOffset = radius + 10;
    const labelOffset = dist < 40 ? baseLabelOffset + (40 - dist) * 0.5 : baseLabelOffset;

    const drawDriver = (driver, done, sx, sy, labelDir) => {
      // Glow
      ctx.beginPath();
      ctx.arc(sx, sy, radius + 3, 0, Math.PI * 2);
      ctx.fillStyle = `#${driver.color}33`;
      ctx.fill();

      // Dot
      ctx.beginPath();
      ctx.arc(sx, sy, radius, 0, Math.PI * 2);
      ctx.fillStyle = done ? `#${driver.color}88` : `#${driver.color}`;
      ctx.fill();

      // Leader line from dot to label
      const labelY = sy + labelDir * labelOffset;
      ctx.beginPath();
      ctx.moveTo(sx, sy + labelDir * (radius + 1));
      ctx.lineTo(sx, labelY + (-labelDir * 4));
      ctx.strokeStyle = `#${driver.color}88`;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Label
      ctx.font = `bold ${radius + 2}px -apple-system, sans-serif`;
      ctx.fillStyle = `#${driver.color}`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(driver.code, sx, labelY);
    };

    // Driver 1 label above (-1), driver 2 label below (+1)
    // Draw slower driver first (behind), faster on top
    if (data.driver1.lap_time <= data.driver2.lap_time) {
      drawDriver(data.driver2, d2Done, s2x, s2y, +1);
      drawDriver(data.driver1, d1Done, s1x, s1y, -1);
    } else {
      drawDriver(data.driver1, d1Done, s1x, s1y, -1);
      drawDriver(data.driver2, d2Done, s2x, s2y, +1);
    }

    // Throttle DOM updates to ~60ms to avoid layout thrashing
    const now = performance.now();
    if (now - lastTelemUpdate > 60 || !playing) {
      lastTelemUpdate = now;
      updateTelemPanel("telemLeft", data.driver1, elapsed);
      updateTelemPanel("telemRight", data.driver2, elapsed);

      // Update progress bar
      const pct = totalTime > 0 ? (elapsed / totalTime) * 100 : 0;
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("timeLabel").textContent = fmtTime(elapsed);
    }
  }

  // ---- Animation loop ----

  function animate(timestamp) {
    if (!playing) return;

    if (lastFrameTime === null) lastFrameTime = timestamp;
    const dt = (timestamp - lastFrameTime) / 1000; // seconds
    lastFrameTime = timestamp;

    elapsed += dt * playbackSpeed;

    const totalTime = Math.max(data.driver1.lap_time, data.driver2.lap_time);
    if (elapsed >= totalTime) {
      elapsed = totalTime;
      playing = false;
      document.getElementById("playBtn").innerHTML = "&#9654;";
      drawFrame();
      return;
    }

    drawFrame();
    animFrame = requestAnimationFrame(animate);
  }

  // ---- Controls ----

  function togglePlay() {
    const totalTime = Math.max(data.driver1.lap_time, data.driver2.lap_time);
    if (elapsed >= totalTime) {
      elapsed = 0;
    }

    playing = !playing;
    document.getElementById("playBtn").innerHTML = playing ? "&#9646;&#9646;" : "&#9654;";

    if (playing) {
      lastFrameTime = null;
      animFrame = requestAnimationFrame(animate);
    } else {
      cancelAnimationFrame(animFrame);
    }
  }

  function restart() {
    playing = false;
    cancelAnimationFrame(animFrame);
    elapsed = 0;
    document.getElementById("playBtn").innerHTML = "&#9654;";
    drawFrame();
  }

  function changeSpeed(dir) {
    speedIdx = Math.max(0, Math.min(speeds.length - 1, speedIdx + dir));
    playbackSpeed = speeds[speedIdx];
    document.getElementById("speedLabel").textContent = playbackSpeed + "x";
  }

  function goFullscreen() {
    const el = document.documentElement;
    if (!document.fullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
      // Try to lock to landscape on mobile
      try { screen.orientation.lock("landscape").catch(() => {}); } catch {}
    } else {
      document.exitFullscreen();
    }
  }

  function goBack() {
    playing = false;
    cancelAnimationFrame(animFrame);
    app.style.display = "none";
    landing.style.display = "flex";
    data = null;
  }

  // ---- Helpers ----

  function fmtTime(secs) {
    if (secs == null) return "—";
    const mins = Math.floor(secs / 60);
    const rem = secs - mins * 60;
    return mins > 0
      ? `${mins}:${rem.toFixed(3).padStart(6, "0")}`
      : rem.toFixed(3);
  }

  // ---- Init ----
  loadFileList();
</script>

</body>
</html>
