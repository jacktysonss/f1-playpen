name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      generate_ghost:
        description: 'Generate ghost car data (slow, downloads F1 telemetry)'
        type: boolean
        default: false
      year:
        description: 'Year (e.g. 2024)'
        type: string
        default: '2024'
      event:
        description: 'Event name (e.g. Bahrain, Monaco, Silverstone)'
        type: string
        default: 'Bahrain'
      session:
        description: 'Session type (Q = Qualifying, R = Race, FP1/FP2/FP3)'
        type: string
        default: 'Q'
      driver1:
        description: 'Driver 1 code (e.g. VER, HAM, NOR)'
        type: string
        default: 'VER'
      driver2:
        description: 'Driver 2 code (e.g. NOR, LEC, HAM)'
        type: string
        default: 'NOR'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for existing ghost data
        id: check_ghost
        run: |
          # Count JSON files that are NOT the sample/synthetic file
          real_count=$(find docs/data/ghost -name '*.json' ! -name 'manifest.json' -exec grep -l '"telemetry"' {} \; 2>/dev/null | wc -l)
          echo "real_count=$real_count" >> "$GITHUB_OUTPUT"
          # Generate if explicitly requested OR if no real data exists yet
          if [[ "${{ inputs.generate_ghost }}" == "true" ]] || [[ "$real_count" -eq 0 ]]; then
            echo "should_generate=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_generate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.check_ghost.outputs.should_generate == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FastF1
        if: steps.check_ghost.outputs.should_generate == 'true'
        run: pip install -r requirements.txt

      - name: Cache FastF1 data
        if: steps.check_ghost.outputs.should_generate == 'true'
        uses: actions/cache@v4
        with:
          path: .f1cache
          key: f1cache-${{ github.sha }}
          restore-keys: f1cache-

      - name: Generate ghost car data
        if: steps.check_ghost.outputs.should_generate == 'true'
        run: |
          year="${{ inputs.year || '2024' }}"
          event="${{ inputs.event || 'Bahrain' }}"
          session="${{ inputs.session || 'Q' }}"
          driver1="${{ inputs.driver1 || 'VER' }}"
          driver2="${{ inputs.driver2 || 'NOR' }}"
          python scripts/generate_ghost_data.py \
            --year "$year" \
            --event "$event" \
            --session "$session" \
            --driver1 "$driver1" \
            --driver2 "$driver2"

      - name: Commit ghost data to repo
        if: steps.check_ghost.outputs.should_generate == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "Add ghost data: ${{ inputs.driver1 || 'VER' }} vs ${{ inputs.driver2 || 'NOR' }} — ${{ inputs.event || 'Bahrain' }} ${{ inputs.year || '2024' }} ${{ inputs.session || 'Q' }}"
          git push

      - name: Build ghost manifest
        run: python scripts/build_manifest.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
